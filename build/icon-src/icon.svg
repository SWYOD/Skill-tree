<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect x="16" y="16" width="480" height="480" rx="112" ry="112" fill="#08080a"/>

  <!-- Иконка ОС (таскбар/док) реально показывается вплоть до 16px, поэтому
       узлы — сплошная заливка, а не тонкие кольца с вырезом: при мелком
       растре кольца превращались в нечитаемое пятно. Координаты сдвинуты так,
       чтобы центр силуэта совпадал с центром скруглённого квадрата (256,256),
       иначе глиф визуально «сползает» вниз в мелких размерах. -->
  <g stroke="#8b5cf6" stroke-width="26" stroke-linecap="round" fill="none">
    <line x1="256" y1="325" x2="256" y2="197"/>
    <line x1="256" y1="325" x2="152" y2="169"/>
    <line x1="256" y1="325" x2="360" y2="169"/>
  </g>

  <circle cx="256" cy="325" r="58" fill="#8b5cf6"/>
  <circle cx="256" cy="197" r="40" fill="#8b5cf6"/>
  <circle cx="152" cy="169" r="40" fill="#8b5cf6"/>
  <circle cx="360" cy="169" r="40" fill="#8b5cf6"/>
</svg>
